<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#07111f">

  <meta
    name="description"
    content="Servlet・JSP・Form・MVC・JavaBeansの試験対策用語集"
  >

  <title>重要用語集｜SSJava BATTLE</title>

  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
  <div
    class="background-grid"
    aria-hidden="true"
  ></div>

  <header class="site-header">
    <a href="index.html" class="brand">
      <span class="brand-icon">☕</span>

      <span>
        <strong>SSJava BATTLE</strong>
        <small>定期考査⑥-1 対策</small>
      </span>
    </a>

    <nav
      class="header-nav"
      aria-label="メインメニュー"
    >
      <a href="index.html" class="nav-link">
        クイズ
      </a>

      <a
        href="glossary.html"
        class="nav-link active"
        aria-current="page"
      >
        用語集
      </a>
    </nav>
  </header>

  <main class="main-container">
    <!-- ==========================================
         用語集ヘッダー
    =========================================== -->
    <section class="glossary-hero">
      <p class="eyebrow">EXAM KEYWORDS</p>

      <h1>
        試験に出やすい<br>

        <span class="gradient-text">
          重要用語集
        </span>
      </h1>

      <p>
        Servlet・JSP・フォーム・MVC・JavaBeansなど、
        試験範囲の重要語句をまとめています。
        用語を読むだけでなく、
        自分の言葉で説明できるか確認しましょう。
      </p>

      <p>
        ※セッションスコープ・アプリケーションスコープは、
        今回の試験範囲に含まれないため掲載していません。
      </p>
    </section>

    <!-- ==========================================
         検索
    =========================================== -->
    <section
      class="search-box"
      aria-label="用語検索"
    >
      <label
        for="glossarySearch"
        class="select-label"
      >
        用語を検索
      </label>

      <input
        id="glossarySearch"
        type="search"
        inputmode="search"
        autocomplete="off"
        spellcheck="false"
        placeholder="例：Servlet、Tomcat、フォワード、JavaBeans"
      >
    </section>

    <!-- ==========================================
         件数表示
    =========================================== -->
    <p
      id="glossaryCount"
      class="glossary-count"
      aria-live="polite"
    >
      用語を読み込んでいます
    </p>

    <!-- ==========================================
         用語カード

         glossary.jsによって自動生成される
    =========================================== -->
    <section
      id="glossaryGrid"
      class="glossary-grid"
      aria-label="重要用語一覧"
    ></section>

    <!-- ==========================================
         検索結果なし
    =========================================== -->
    <p
      id="noResults"
      class="no-results hidden"
      aria-live="polite"
    >
      該当する用語が見つかりませんでした。
    </p>

    <!-- ==========================================
         JavaScript読込失敗時
    =========================================== -->
    <noscript>
      <p class="no-results">
        用語集を表示するにはJavaScriptを有効にしてください。
      </p>
    </noscript>
  </main>

  <footer class="site-footer">
    <p>
      SSJava BATTLE｜
      用語を自分の言葉で説明できるか確認しよう。
    </p>
  </footer>

  <script
    src="assets/glossary.js"
    defer
  ></script>
</body>
</html>
